<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BLUCINE OS</title>

<link rel="stylesheet" href="style.css">

</head>

<body>



<!-- DESKTOP -->

<div id="desktop">


<div class="icon" onclick="openWindow('archive')">

<div class="iconImg">📁</div>
<div class="iconText">Archive</div>

</div>


<div class="icon" onclick="openWindow('lab')">

<div class="iconImg">💻</div>
<div class="iconText">Lab</div>

</div>


<div class="icon" onclick="openWindow('playroom')">

<div class="iconImg">🎮</div>

</div>


<div class="icon" onclick="openWindow('studio')">

<div class="iconImg">🖼</div>

</div>


<div class="icon" onclick="openWindow('manifesto')">

<div class="iconImg">📄</div>
<div class="iconText">Manifesto</div>

</div>


</div>



<!-- TASKBAR -->

<div id="taskbar">

<div id="startBtn" onclick="toggleStart()">
START
</div>

<div id="clock">
12:00
</div>

</div>



<!-- START MENU -->

<div id="startMenu">

<div onclick="openWindow('archive')">Archive</div>
<div onclick="openWindow('lab')">Lab</div>

</div>

ARCHIVE
==================== -->

Archive

<div class="closeBtn" onclick="closeWindow('archive')">
X
</div>

</div>


<div class="sideBar">

<button onclick="closeWindow('archive')">
X
</button>

</div>


<div class="content archive">

<h1>ARCHIVE</h1>

</div>

</div>
