<script>
// ======================================================
// BLUCINELAB OS — SCRIPT OPTIMIZED v2
// Mantiene il concept, riduce il rumore
// ======================================================

// ─────────────────────────────────────
// BASIC HELPERS
// ─────────────────────────────────────
const $ = (sel, ctx = document) => ctx.querySelector(sel);
const $$ = (sel, ctx = document) => [...ctx.querySelectorAll(sel)];

// ─────────────────────────────────────
// GLOBAL STATE
// ─────────────────────────────────────
const state = {
  topZ: 200,
  bootDone: false,
  popupShown: false,
  konamiSeq: [],
  pac: {
    active: false,
    x: 200,
    y: 200,
    dirX: 2.4,
    dirY: 0,
    score: 0,
    lives: 3,
    powerMode: false,
    powerTimer: 0,
    dots: [],
    ghosts: [],
    animationId: null
  }
};

// ─────────────────────────────────────
// CURSOR
// ─────────────────────────────────────
(function initCursor() {
  const cur = $('#cur');
  if (!cur) return;

  const hasFinePointer = window.matchMedia('(pointer:fine)').matches;
  if (!hasFinePointer) {
    cur.style.display = 'none';
    document.body.style.cursor = 'auto';
    return;
  }

  document.body.style.cursor = 'none';

  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px';
    cur.style.top = e.clientY + 'px';
  });
})();

// ─────────────────────────────────────
// CLOCK
// ─────────────────────────────────────
function updateClock() {
  const now = new Date();
  const clock = $('#clock');
  if (!clock) return;

  clock.textContent =
    String(now.getHours()).padStart(2, '0') + ':' +
    String(now.getMinutes()).padStart(2, '0') + ':' +
    String(now.getSeconds()).padStart(2, '0');
}
setInterval(updateClock, 1000);
updateClock();

// ─────────────────────────────────────
// BOOT SEQUENCE
// ─────────────────────────────────────
(function initBoot() {
  const boot = $('#boot');
  const bootBar = $('#boot-bar');
  const bootTextEl = $('#boot-text');
  if (!boot || !bootBar || !bootTextEl) {
    state.bootDone = true;
    return;
  }

  const alreadyBooted = sessionStorage.getItem('blucinelab_booted');

  if (alreadyBooted) {
    boot.remove();
    state.bootDone = true;
    showWelcomePopupOnce();
    return;
  }

  const bootLines = [
    'BLUCINELAB OS v1.0 — AVVIO SISTEMA',
    'Caricamento driver visivi... OK',
    'Inizializzazione archivio immagini... OK',
    'Avvio interfaccia utente... OK',
    'SISTEMA PRONTO.'
  ];

  let lineIdx = 0;

  function bootStep() {
    if (lineIdx < bootLines.length) {
      bootTextEl.textContent += bootLines[lineIdx] + '\n';
      lineIdx++;

      const progress = Math.round((lineIdx / bootLines.length) * 100);
      bootBar.style.width = progress + '%';

      setTimeout(bootStep, 180);
    } else {
      sessionStorage.setItem('blucinelab_booted', '1');
      setTimeout(() => {
        boot.style.transition = 'opacity .45s ease';
        boot.style.opacity = '0';
        setTimeout(() => {
          boot.remove();
          state.bootDone = true;
          showWelcomePopupOnce();
        }, 450);
      }, 350);
    }
  }

  setTimeout(bootStep, 350);
})();

// ─────────────────────────────────────
// WINDOW MANAGEMENT
// ─────────────────────────────────────
function bringToFront(win) {
  if (!win) return;
  win.style.zIndex = ++state.topZ;
}

function isWindowVisible(win) {
  return win && getComputedStyle(win).display !== 'none';
}

function openWindow(id) {
  const win = document.getElementById(id);
  if (!win) return;

  win.style.display = 'flex';
  win.style.flexDirection = 'column';

  if (win.dataset.minimized === '1') {
    restoreWindowBody(win);
    win.dataset.minimized = '0';
  }

  bringToFront(win);
  updateTaskbar();
}

function closeWindow(id) {
  const win = document.getElementById(id);
  if (!win) return;

  // la hero window non deve sparire davvero
  if (id === 'hero-win') {
    openWindow(id);
    bringToFront(win);
    return;
  }

  win.style.display = 'none';
  updateTaskbar();
}

function restoreWindowBody(win) {
  const body = $('.win-body', win);
  const menubar = $('.win-menubar', win);
  if (body) body.style.display = '';
  if (menubar) menubar.style.display = '';
}

function minimizeWindow(id) {
  const win = document.getElementById(id);
  if (!win) return;

  const body = $('.win-body', win);
  const menubar = $('.win-menubar', win);

  if (win.dataset.minimized === '1') {
    restoreWindowBody(win);
    win.dataset.minimized = '0';
  } else {
    if (body) body.style.display = 'none';
    if (menubar) menubar.style.display = 'none';
    win.dataset.minimized = '1';
  }

  updateTaskbar();
}

function maximizeWindow(id) {
  const win = document.getElementById(id);
  if (!win) return;

  if (win.dataset.maximized === '1') {
    win.style.top = win.dataset.prevTop || '';
    win.style.left = win.dataset.prevLeft || '';
    win.style.width = win.dataset.prevW || '';
    win.style.height = win.dataset.prevH || '';
    win.dataset.maximized = '0';
  } else {
    win.dataset.prevTop = win.style.top;
    win.dataset.prevLeft = win.style.left;
    win.dataset.prevW = win.style.width;
    win.dataset.prevH = win.style.height;

    win.style.top = '36px';
    win.style.left = '80px';
    win.style.width = (window.innerWidth - 90) + 'px';
    win.style.height = (window.innerHeight - 78) + 'px';
    win.dataset.maximized = '1';

    bringToFront(win);
  }
}

function updateTaskbar() {
  const container = $('#taskbar-tasks');
  if (!container) return;

  container.innerHTML = '';

  $$('.win').forEach(win => {
    if (!isWindowVisible(win)) return;

    const btn = document.createElement('button');
    btn.className = 'taskbar-btn';

    const title = $('.win-title', win)?.textContent?.trim() || win.id;
    btn.textContent = title.slice(0, 20);

    if (win.dataset.minimized === '1') {
      btn.classList.remove('active');
    } else {
      btn.classList.add('active');
    }

    btn.addEventListener('click', () => {
      if (win.dataset.minimized === '1') {
        minimizeWindow(win.id);
      }
      bringToFront(win);
    });

    container.appendChild(btn);
  });
}

// ─────────────────────────────────────
// DRAG WINDOWS
// ─────────────────────────────────────
function makeWindowDraggable(titlebar) {
  const winId = titlebar.dataset.drag;
  const win = document.getElementById(winId);
  if (!win) return;

  let dragging = false;
  let ox = 0;
  let oy = 0;

  titlebar.addEventListener('mousedown', e => {
    if (e.target.closest('.win-btn')) return;
    dragging = true;

    const rect = win.getBoundingClientRect();
    ox = e.clientX - rect.left;
    oy = e.clientY - rect.top;

    bringToFront(win);
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;

    const maxLeft = window.innerWidth - 120;
    const maxTop = window.innerHeight - 60;

    win.style.left = Math.max(0, Math.min(maxLeft, e.clientX - ox)) + 'px';
    win.style.top = Math.max(28, Math.min(maxTop, e.clientY - oy)) + 'px';
  });

  document.addEventListener('mouseup', () => {
    dragging = false;
  });

  titlebar.addEventListener('touchstart', e => {
    if (e.target.closest('.win-btn')) return;

    dragging = true;
    const t = e.touches[0];
    const rect = win.getBoundingClientRect();
    ox = t.clientX - rect.left;
    oy = t.clientY - rect.top;
    bringToFront(win);
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!dragging) return;

    const t = e.touches[0];
    const maxLeft = window.innerWidth - 120;
    const maxTop = window.innerHeight - 60;

    win.style.left = Math.max(0, Math.min(maxLeft, t.clientX - ox)) + 'px';
    win.style.top = Math.max(28, Math.min(maxTop, t.clientY - oy)) + 'px';
  }, { passive: true });

  document.addEventListener('touchend', () => {
    dragging = false;
  });
}

$$('[data-drag]').forEach(makeWindowDraggable);

// ─────────────────────────────────────
// BUTTON BINDINGS
// ─────────────────────────────────────
$$('[data-close]').forEach(btn => {
  btn.addEventListener('click', () => closeWindow(btn.dataset.close));
});

$$('[data-minimize]').forEach(btn => {
  btn.addEventListener('click', () => minimizeWindow(btn.dataset.minimize));
});

$$('[data-maximize]').forEach(btn => {
  btn.addEventListener('click', () => maximizeWindow(btn.dataset.maximize));
});

// ─────────────────────────────────────
// DESKTOP ICONS
// Mantengo doppio click desktop, ma senza goffaggini inutili
// ─────────────────────────────────────
$$('.desktop-icon[data-win]').forEach(icon => {
  let clicks = 0;
  let timer = null;

  icon.addEventListener('click', () => {
    clicks++;
    clearTimeout(timer);

    timer = setTimeout(() => {
      if (clicks >= 2) openWindow(icon.dataset.win);
      clicks = 0;
    }, 260);
  });

  icon.addEventListener('dblclick', () => {
    clearTimeout(timer);
    clicks = 0;
    openWindow(icon.dataset.win);
  });
});

// ─────────────────────────────────────
// START MENU
// ─────────────────────────────────────
const startMenu = $('#start-menu');
const startButton = $('#taskbar-start');

if (startButton && startMenu) {
  startButton.addEventListener('click', e => {
    e.stopPropagation();
    startMenu.classList.toggle('open');
  });

  document.addEventListener('click', e => {
    if (!startMenu.contains(e.target) && e.target !== startButton) {
      startMenu.classList.remove('open');
    }
  });
}

$$('[data-open]').forEach(item => {
  item.addEventListener('click', () => {
    openWindow(item.dataset.open);
    startMenu?.classList.remove('open');
  });
});

const shutdownBtn = $('#sm-shutdown');
if (shutdownBtn) {
  shutdownBtn.addEventListener('click', () => {
    document.body.innerHTML = `
      <div style="background:#000;color:#00ff00;font-family:'Press Start 2P',monospace;font-size:14px;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:20px;">
        <div>È SICURO SPEGNERE IL COMPUTER</div>
        <div style="font-size:9px;color:#808080;">BLUCINELAB OS v1.0</div>
        <button onclick="location.reload()" style="font-family:'Press Start 2P',monospace;font-size:8px;padding:10px 20px;background:#000;color:#00ff00;border:2px solid #00ff00;cursor:pointer;margin-top:20px;">
          ↺ RIAVVIA
        </button>
      </div>
    `;
  });
}

// ─────────────────────────────────────
// FOCUS WINDOWS
// ─────────────────────────────────────
$$('.win').forEach(win => {
  win.addEventListener('mousedown', () => bringToFront(win));
});

// ─────────────────────────────────────
// ALERT SYSTEM
// un solo sistema, niente mitragliata di popup
// ─────────────────────────────────────
let alertZ = 9000;

function showAlert(title, msg, onOk = null) {
  const w = document.createElement('div');
  w.className = 'win win-alert';
  w.style.top = (110 + Math.random() * 80) + 'px';
  w.style.left = (Math.max(20, window.innerWidth / 2 - 170 + Math.random() * 40)) + 'px';
  w.style.zIndex = ++alertZ;

  w.innerHTML = `
    <div class="win-titlebar" style="background:linear-gradient(90deg,#800000,#400000)">
      <span class="win-icon">⚠</span>
      <span class="win-title">${title}</span>
      <div class="win-controls">
        <button class="win-btn close">✕</button>
      </div>
    </div>
    <div class="win-body">
      <div class="alert-row">
        <span class="alert-icon">🔔</span>
        <span class="alert-msg">${msg.replace(/\n/g, '<br>')}</span>
      </div>
      <div class="alert-btns">
        <button class="alert-ok">OK</button>
      </div>
    </div>
  `;

  document.body.appendChild(w);
  bringToFront(w);

  const closeBtn = $('.close', w);
  const okBtn = $('.alert-ok', w);
  const titlebar = $('.win-titlebar', w);

  let dragging = false;
  let ox = 0;
  let oy = 0;

  titlebar.addEventListener('mousedown', e => {
    if (e.target.closest('.win-btn')) return;
    dragging = true;
    const r = w.getBoundingClientRect();
    ox = e.clientX - r.left;
    oy = e.clientY - r.top;
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    w.style.left = Math.max(0, e.clientX - ox) + 'px';
    w.style.top = Math.max(20, e.clientY - oy) + 'px';
  });

  document.addEventListener('mouseup', () => {
    dragging = false;
  });

  const destroy = () => {
    w.remove();
    if (typeof onOk === 'function') onOk();
  };

  closeBtn?.addEventListener('click', () => w.remove());
  okBtn?.addEventListener('click', destroy);
}

function showWelcomePopupOnce() {
  if (state.popupShown) return;
  state.popupShown = true;

  setTimeout(() => {
    showAlert(
      'BENVENUTO',
      'Esplora il desktop.\nApri Archive, Studio, Lab, Contact e Manifesto.'
    );
  }, 900);
}

// ─────────────────────────────────────
// EASTER EGG
// ─────────────────────────────────────
const eggBtn = $('#egg-btn');
if (eggBtn) {
  eggBtn.addEventListener('click', () => {
    showAlert(
      '??? INSERT COIN ???',
      'Hai trovato il segreto.\nLa modalità arcade è opzionale.\nApri Start > Pac-Man oppure usa il codice classico.'
    );
  });
}

const KONAMI = [
  'ArrowUp', 'ArrowUp',
  'ArrowDown', 'ArrowDown',
  'ArrowLeft', 'ArrowRight',
  'ArrowLeft', 'ArrowRight',
  'b', 'a'
];

document.addEventListener('keydown', e => {
  state.konamiSeq.push(e.key);
  state.konamiSeq = state.konamiSeq.slice(-10);

  if (JSON.stringify(state.konamiSeq) === JSON.stringify(KONAMI)) {
    if (!$('#rainbow-style')) {
      const style = document.createElement('style');
      style.id = 'rainbow-style';
      style.textContent = `
        @keyframes rainbowShift {
          0% { filter:hue-rotate(0deg); }
          100% { filter:hue-rotate(360deg); }
        }
      `;
      document.head.appendChild(style);
    }

    document.body.style.animation = 'rainbowShift 1.2s linear infinite';
    showAlert('🌈 CHEAT CODE!', 'MODALITÀ ARCOBALENO ATTIVATA!');
  }
});

// ─────────────────────────────────────
// PAC MAN
// ora è opzionale, non dominante
// ─────────────────────────────────────
const pacLayer = $('#pacman-layer');
const pacEl = $('#pac');

function resetPacDisplay() {
  if (!pacEl || !pacLayer) return;

  pacEl.style.display = state.pac.active ? 'block' : 'none';

  $$('.ghost', pacLayer).forEach(g => {
    g.style.display = state.pac.active ? 'block' : 'none';
  });

  $$('.dot', pacLayer).forEach(d => {
    d.style.display = state.pac.active ? 'block' : 'none';
  });
}

function updatePacHUD() {
  const scoreNum = $('#score-num');
  const livesDisp = $('#lives-disp');

  if (scoreNum) scoreNum.textContent = String(state.pac.score);
  if (livesDisp) {
    livesDisp.textContent =
      'LIVES: ' +
      '♥'.repeat(state.pac.lives) +
      '♡'.repeat(3 - state.pac.lives);
  }
}

function spawnDots() {
  if (!pacLayer) return;

  $$('.dot', pacLayer).forEach(d => d.remove());
  state.pac.dots.length = 0;

  const NUM_DOTS = 42;

  for (let i = 0; i < NUM_DOTS; i++) {
    const d = document.createElement('div');
    const power = i % 10 === 0;
    d.className = power ? 'dot power-dot' : 'dot';

    const x = 120 + Math.random() * Math.max(100, window.innerWidth - 200);
    const y = 60 + Math.random() * Math.max(100, window.innerHeight - 130);

    d.style.left = x + 'px';
    d.style.top = y + 'px';
    pacLayer.appendChild(d);

    state.pac.dots.push({
      el: d,
      x,
      y,
      eaten: false,
      power
    });
  }
}

function spawnGhosts() {
  if (!pacLayer) return;

  $$('.ghost', pacLayer).forEach(g => g.remove());
  state.pac.ghosts.length = 0;

  const ghostGlyphs = ['👻', '👹', '👺'];
  const ghostColors = ['#ff0000', '#ffb8ff', '#00ffff'];

  for (let i = 0; i < 3; i++) {
    const g = document.createElement('div');
    g.className = 'ghost';
    g.textContent = ghostGlyphs[i];
    g.style.color = ghostColors[i];
    g.style.left = (300 + i * 140) + 'px';
    g.style.top = '300px';
    pacLayer.appendChild(g);

    state.pac.ghosts.push({
      el: g,
      x: 300 + i * 140,
      y: 300,
      vx: (Math.random() - 0.5) * 2,
      vy: (Math.random() - 0.5) * 2,
      scared: false
    });
  }
}

function resetPacGame() {
  state.pac.x = Math.max(160, window.innerWidth / 2);
  state.pac.y = Math.max(160, window.innerHeight / 2);
  state.pac.dirX = 2.4;
  state.pac.dirY = 0;
  state.pac.score = 0;
  state.pac.lives = 3;
  state.pac.powerMode = false;
  state.pac.powerTimer = 0;

  updatePacHUD();
  spawnDots();
  spawnGhosts();
  resetPacDisplay();
}

function pacLoop() {
  if (!state.pac.active || !pacEl) return;

  const p = state.pac;

  p.x += p.dirX;
  p.y += p.dirY;

  if (p.x < 10 || p.x > window.innerWidth - 40) p.dirX *= -1;
  if (p.y < 40 || p.y > window.innerHeight - 50) p.dirY *= -1;

  if (Math.random() < 0.008) {
    p.dirX += (Math.random() - 0.5) * 0.8;
    p.dirY += (Math.random() - 0.5) * 0.8;
  }

  pacEl.style.left = p.x + 'px';
  pacEl.style.top = p.y + 'px';

  const angle = Math.atan2(p.dirY, p.dirX) * 180 / Math.PI;
  pacEl.style.transform = `rotate(${angle}deg)`;

  if (p.powerMode) {
    p.powerTimer--;
    if (p.powerTimer <= 0) {
      p.powerMode = false;
      p.ghosts.forEach(g => {
        g.scared = false;
        g.el.style.filter = '';
      });
    }
  }

  p.dots.forEach(dot => {
    if (dot.eaten) return;

    const dx = p.x - dot.x;
    const dy = p.y - dot.y;

    if (Math.sqrt(dx * dx + dy * dy) < 22) {
      dot.eaten = true;
      dot.el.style.opacity = '0';
      setTimeout(() => dot.el.remove(), 200);

      if (dot.power) {
        p.score += 50;
        p.powerMode = true;
        p.powerTimer = 180;
        p.ghosts.forEach(g => {
          g.scared = true;
          g.el.style.filter = 'hue-rotate(180deg) brightness(.7)';
        });
      } else {
        p.score += 10;
      }

      updatePacHUD();

      if (p.dots.every(d => d.eaten)) {
        setTimeout(() => {
          spawnDots();
          resetPacDisplay();
        }, 700);
      }
    }
  });

  p.ghosts.forEach(g => {
    const dx = p.x - g.x;
    const dy = p.y - g.y;

    if (g.scared) {
      g.vx = g.vx * 0.9 - dx * 0.0022;
      g.vy = g.vy * 0.9 - dy * 0.0022;
    } else {
      g.vx = g.vx * 0.94 + dx * 0.0012;
      g.vy = g.vy * 0.94 + dy * 0.0012;
    }

    g.x += g.vx;
    g.y += g.vy;

    g.x = Math.max(10, Math.min(window.innerWidth - 40, g.x));
    g.y = Math.max(40, Math.min(window.innerHeight - 50, g.y));

    g.el.style.left = g.x + 'px';
    g.el.style.top = g.y + 'px';

    const cdx = p.x - g.x;
    const cdy = p.y - g.y;

    if (Math.sqrt(cdx * cdx + cdy * cdy) < 26) {
      if (g.scared) {
        p.score += 200;
        updatePacHUD();

        g.x = 260 + Math.random() * 220;
        g.y = 180 + Math.random() * 180;
        g.vx = (Math.random() - 0.5) * 2;
        g.vy = (Math.random() - 0.5) * 2;
        g.scared = false;
        g.el.style.filter = '';
      } else {
        p.lives = Math.max(0, p.lives - 1);
        updatePacHUD();

        p.x = window.innerWidth / 2;
        p.y = window.innerHeight / 2;
        p.dirX = 2.4;
        p.dirY = 0;

        if (p.lives === 0) {
          p.active = false;
          resetPacDisplay();
          showAlert('GAME OVER', 'Hai perso tutte le vite.\nPunteggio: ' + p.score, () => {
            resetPacGame();
          });
          return;
        }
      }
    }
  });

  state.pac.animationId = requestAnimationFrame(pacLoop);
}

function togglePacman() {
  state.pac.active = !state.pac.active;
  resetPacDisplay();

  if (state.pac.active) {
    if (state.pac.dots.length === 0 || state.pac.ghosts.length === 0) {
      resetPacGame();
    }
    cancelAnimationFrame(state.pac.animationId);
    state.pac.animationId = requestAnimationFrame(pacLoop);
  } else {
    cancelAnimationFrame(state.pac.animationId);
  }
}

const pacToggleBtn = $('#sm-pacman');
if (pacToggleBtn) {
  pacToggleBtn.addEventListener('click', () => {
    togglePacman();
    startMenu?.classList.remove('open');
  });
}

document.addEventListener('keydown', e => {
  if (!state.pac.active) return;

  const spd = 3.5;

  if (e.key === 'ArrowLeft') {
    state.pac.dirX = -spd;
    state.pac.dirY = 0;
    e.preventDefault();
  }
  if (e.key === 'ArrowRight') {
    state.pac.dirX = spd;
    state.pac.dirY = 0;
    e.preventDefault();
  }
  if (e.key === 'ArrowUp') {
    state.pac.dirX = 0;
    state.pac.dirY = -spd;
    e.preventDefault();
  }
  if (e.key === 'ArrowDown') {
    state.pac.dirX = 0;
    state.pac.dirY = spd;
    e.preventDefault();
  }
});

resetPacGame();
state.pac.active = false;
resetPacDisplay();

// ─────────────────────────────────────
// BACKGROUND CANVAS
// lo tengo, ma solo come atmosfera
// ─────────────────────────────────────
(function initBackgroundCanvas() {
  const desktop = $('#desktop');
  if (!desktop) return;

  const bgCanvas = document.createElement('canvas');
  bgCanvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;';
  desktop.appendChild(bgCanvas);

  const ctx = bgCanvas.getContext('2d');
  let t = 0;

  function resizeBg() {
    bgCanvas.width = window.innerWidth;
    bgCanvas.height = window.innerHeight;
  }

  function drawBg() {
    const W = bgCanvas.width;
    const H = bgCanvas.height;

    ctx.clearRect(0, 0, W, H);
    t++;

    ctx.fillStyle = '#0d0030';

    const buildingData = [.05,.12,.07,.18,.09,.22,.06,.14,.08,.2,.1,.16,.07,.11,.09,.19,.06,.15,.08,.13,.1,.2,.07,.17,.09,.12];
    const bw = W / (buildingData.length / 2);

    for (let i = 0; i < buildingData.length; i += 2) {
      const bx = i / 2 * bw;
      const bh = buildingData[i + 1] * H * 0.55;

      ctx.fillRect(bx, H - bh - 30, bw - 2, bh);

      for (let wy = H - bh - 20; wy < H - 40; wy += 12) {
        for (let wx = bx + 4; wx < bx + bw - 8; wx += 10) {
          const on = Math.sin(t * 0.01 + wx + wy) > 0.55;
          ctx.fillStyle = on
            ? `rgba(255,220,80,${0.18 + 0.16 * Math.sin(t * 0.04 + wx)})`
            : 'rgba(0,20,60,.36)';
          ctx.fillRect(wx, wy, 6, 8);
        }
      }
    }

    for (let i = 0; i < 90; i++) {
      const sx = (i * 137.5) % W;
      const sy = (i * 79.3) % (H * 0.58);
      const alpha = 0.18 + 0.25 * Math.sin(t * 0.03 + i);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fillRect(sx, sy, i % 3 === 0 ? 2 : 1, i % 3 === 0 ? 2 : 1);
    }

    requestAnimationFrame(drawBg);
  }

  resizeBg();
  window.addEventListener('resize', resizeBg);
  drawBg();
})();

// ─────────────────────────────────────
// RESIZE SAFETY
// ─────────────────────────────────────
window.addEventListener('resize', () => {
  $$('.win').forEach(win => {
    const rect = win.getBoundingClientRect();
    if (rect.right > window.innerWidth) {
      win.style.left = Math.max(0, window.innerWidth - rect.width - 10) + 'px';
    }
    if (rect.bottom > window.innerHeight - 30) {
      win.style.top = Math.max(28, window.innerHeight - rect.height - 42) + 'px';
    }
  });
});

updateTaskbar();
updatePacHUD();
</script>
