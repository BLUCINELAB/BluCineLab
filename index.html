<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BLUCINELAB OS</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

/* BASE */

body{
margin:0;
overflow:hidden;
font-family:Tahoma;
}

#desktop{
position:fixed;
inset:0;
background:linear-gradient(#87b4ff,#5c93e8 40%,#4f8a2e 41%,#67b63b);
}

/* WINDOW */

.win{
position:fixed;
background:#ece9d8;
border:2px solid #0a246a;
display:flex;
flex-direction:column;
}

.win-titlebar{
background:#245edb;
color:white;
padding:4px;
}

.win-body{
flex:1;
overflow:auto;
}

/* WORLD */

.world{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
}

/* RAIL */

.rail{
position:absolute;
left:0;
top:0;
bottom:0;
width:70px;
background:black;
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

/* NANO */

.nano{
position:absolute;
bottom:10px;
left:10px;
font-size:40px;
animation:walk 1s infinite;
}

@keyframes walk{
0%{transform:translateX(0)}
50%{transform:translateX(5px)}
100%{transform:translateX(0)}
}

/* PLAYROOM WII */

.playroom{

background:linear-gradient(#ffffff,#ddeeff);

font-family:sans-serif;

}

.wii-menu{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:20px;

padding:100px;

}

.wii-btn{

background:white;

border-radius:20px;

height:120px;

display:flex;

align-items:center;

justify-content:center;

font-size:20px;

box-shadow:0 4px 10px rgba(0,0,0,0.3);

cursor:pointer;

}

.wii-btn:hover{

transform:scale(1.05);

}

</style>

</head>
<body>

<div id="desktop"></div>


<!-- HOME -->

<div class="win" style="top:60px;left:100px;width:400px">

<div class="win-titlebar">

HOME

</div>

<div class="win-body">

XP HOME

<div class="nano">🙂</div>

</div>

</div>



<!-- PLAYROOM WII -->

<div class="world playroom" id="playroom">

<div class="rail">

<button onclick="closePlay()">X</button>

</div>


<div class="wii-menu">

<div class="wii-btn" onclick="openGame('mario')">

MARIO

</div>

<div class="wii-btn" onclick="openGame('cooking')">

COOKING

</div>

<div class="wii-btn" onclick="openGame('invaders')">

INVADERS

</div>

<div class="wii-btn" onclick="openGame('tama')">

TAMAGOTCHI

</div>

<div class="wii-btn">

COMING

</div>

<div class="wii-btn">

COMING

</div>

</div>


<div class="nano">🧑</div>

</div>



<script>

function closePlay(){

document.getElementById("playroom").style.display="none"

}

function openGame(name){

alert("open "+name)

}

</script>

</body>
</html>
