<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BLUCINELAB OS</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- DESKTOP -->

<div id="desktop">

<div class="icon" onclick="openWindow('playroom')">
🎮 PLAYROOM
</div>

<div class="icon" onclick="openWindow('lab')">
🧪 LAB
</div>

<div class="icon" onclick="openWindow('archive')">
📁 ARCHIVE
</div>

</div>


<!-- TASKBAR -->

<div id="taskbar">

<button id="startBtn" onclick="toggleStart()">
START
</button>

</div>


<!-- START MENU -->

<div id="startMenu">

<div onclick="openWindow('playroom')">
Playroom
</div>

<div onclick="openWindow('lab')">
Lab
</div>

<div onclick="openWindow('archive')">
Archive
</div>

</div>


<!-- WINDOW PLAYROOM -->

<div class="window" id="playroom">

<div class="sideBar">

<button onclick="closeWindow('playroom')">
X
</button>

<button onclick="showMenu()">
MENU
</button>

</div>

<div class="content playroom">

<div id="menu">

<button onclick="startGame('mario')">
MARIO
</button>

<button onclick="startGame('cooking')">
COOKING
</button>

</div>


<div id="mario" class="game">

<div id="player">
🙂
</div>

<div class="ground"></div>

</div>


<div id="cooking" class="game">

<h1>COOKING</h1>

<div id="food" onclick="cook()">
🍳
</div>

<div id="score">
0
</div>

</div>

<div class="nano">
🧑
</div>

</div>

</div>


<!-- WINDOW LAB -->

<div class="window" id="lab">

<div class="sideBar">

<button onclick="closeWindow('lab')">
X
</button>

</div>

<div class="content lab">

<h1>LAB WORLD</h1>

<div class="nano">
🤖
</div>

</div>

</div>


<!-- WINDOW ARCHIVE -->

<div class="window" id="archive">

<div class="sideBar">

<button onclick="closeWindow('archive')">
X
</button>

</div>

<div class="content archive">

<h1>ARCHIVE WORLD</h1>

<div class="nano">
👾
</div>

</div>

</div>


<script src="script.js"></script>

</body>
</html></html>
