<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BLUCINE OS</title>

<link rel="stylesheet" href="style.css">

</head>

<body>



<div id="desktop">


<div class="icon" onclick="openWindow('archive')">

<div class="iconImg">📁</div>
<div class="iconText">Archive</div>

</div>


<div class="icon" onclick="openWindow('lab')">

<div class="iconImg">💻</div>
<div class="iconText">Lab</div>

</div>


<div class="icon" onclick="openWindow('playroom')">

<div class="iconImg">🎮</div>
<div class="iconText">Playroom</div>

</div>


<div class="icon" onclick="openWindow('studio')">

<div class="iconImg">🖼</div>
<div class="iconText">Studio</div>

</div>


<div class="icon" onclick="openWindow('manifesto')">

<div class="iconImg">📄</div>
<div class="iconText">Manifesto</div>

</div>


<div class="icon">

<div class="iconImg">🗑</div>
<div class="iconText">Trash</div>

</div>


</div>



<div id="taskbar">

<div id="startBtn" onclick="toggleStart()">START</div>

<div id="clock">12:00</div>

</div>



<div id="startMenu">

<div onclick="openWindow('archive')">Archive</div>
<div onclick="openWindow('lab')">Lab</div>
<div onclick="openWindow('playroom')">Playroom</div>
<div onclick="openWindow('studio')">Studio</div>

</div>



<!-- ARCHIVE -->

<div class="window" id="archive">

<div class="titlebar">

Archive

<div class="closeBtn" onclick="closeWindow('archive')">X</div>

</div>

<div class="sideBar">

<button onclick="closeWindow('archive')">X</button>

</div>

<div class="content archive">

<h1>ARCHIVE</h1>

<div class="nano">👾</div>

</div>

</div>



<!-- LAB -->

<div class="window" id="lab">

<div class="titlebar">

Lab

<div class="closeBtn" onclick="closeWindow('lab')">X</div>

</div>

<div class="sideBar">

<button onclick="closeWindow('lab')">X</button>

</div>

<div class="content lab">

<h1>LAB</h1>

<div class="nano">🤖</div>

</div>

</div>



<!-- PLAYROOM -->

<div class="window" id="playroom">

<div class="titlebar">

Playroom

<div class="closeBtn" onclick="closeWindow('playroom')">X</div>

</div>

<div class="sideBar">

<button onclick="closeWindow('playroom')">X</button>

</div>

<div class="content playroom">

<h1>PLAYROOM</h1>

<div class="nano">🎮</div>

</div>

</div>



<script src="script.js"></script>

</body>
</html>
