<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BLUCINE OS</title>

<link rel="stylesheet" href="style.css">

</head>

<body>



<!-- ================= BOOT ================= -->

<div id="bootScreen">

<div>BLUCINE OS LOADING...</div>

<div class="bar">
<div id="bootBar"></div>
</div>

</div>



<!-- ================= DESKTOP ================= -->

<div id="desktop">



<div class="icon" onclick="openWindow('archive')">
📁 ARCHIVE
</div>

<div class="icon" onclick="openWindow('lab')">
💻 LAB
</div>

<div class="icon" onclick="openWindow('playroom')">
🎮 PLAYROOM
</div>

<div class="icon" onclick="openWindow('studio')">
🏠 STUDIO
</div>

<div class="icon" onclick="openWindow('manifesto')">
📜 MANIFESTO
</div>



</div>



<!-- ================= TASKBAR ================= -->

<div id="taskbar">

<div id="startBtn" onclick="toggleStart()">
START
</div>

<div id="clock">
12:00
</div>

</div>



<!-- ================= START MENU ================= -->

<div id="startMenu">

<div onclick="openWindow('archive')">
Archive
</div>

<div onclick="openWindow('lab')">
Lab
</div>

<div onclick="openWindow('playroom')">
Playroom
</div>

<div onclick="openWindow('studio')">
Studio
</div>

</div>



<!-- ================= ARCHIVE ================= -->

<div class="window" id="archive">

<div class="sideBar">

<button onclick="closeWindow('archive')">
X
</button>

</div>

<div class="content archive">

<h1>ARCHIVE WORLD</h1>

<div class="nano">👾</div>

</div>

</div>



<!-- ================= LAB ================= -->

<div class="window" id="lab">

<div class="sideBar">

<button onclick="closeWindow('lab')">
X
</button>

</div>

<div class="content lab">

<h1>LAB WORLD</h1>

<div class="nano">🤖</div>

</div>

</div>



<!-- ================= PLAYROOM ================= -->

<div class="window" id="playroom">

<div class="sideBar">

<button onclick="closeWindow('playroom')">
X
</button>

</div>

<div class="content playroom">

<h1>PLAYROOM</h1>

<div class="nano">🎮</div>

</div>

</div>



<!-- ================= STUDIO ================= -->

<div class="window" id="studio">

<div class="sideBar">

<button onclick="closeWindow('studio')">
X
</button>

</div>

<div class="content studio">

<h1>STUDIO WORLD</h1>

<div class="nano">🧑</div>

</div>

</div>



<!-- ================= MANIFESTO ================= -->

<div class="window" id="manifesto">

<div class="sideBar">

<button onclick="closeWindow('manifesto')">
X
</button>

</div>

<div class="content manifesto">

<h1>MANIFESTO</h1>

<div class="nano">📜</div>

</div>

</div>



<script src="script.js"></script>

</body>
</html>
