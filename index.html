<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLUCINELAB</title>
  <meta
    name="description"
    content="BluCineLab — laboratorio visivo tra immagine, spazio, direzione, scenografia e sistemi digitali."
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    :root{
      --bg:#02050a;
      --bg-soft:#08111a;
      --panel:rgba(11,16,24,.74);
      --panel-2:rgba(14,20,30,.82);
      --text:#e8e2d7;
      --text-soft:rgba(220,212,198,.82);
      --muted:rgba(220,212,198,.56);
      --gold:rgba(208,178,122,.42);
      --gold-strong:rgba(230,198,140,.78);
      --line:rgba(255,255,255,.06);
      --max:1280px;
      --content:1120px;
      --topbar-h:74px;
      --dock-progress:0;
      --hero-glow-x:50%;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:Inter,sans-serif;
      overflow-x:hidden;
      cursor:none;
      min-height:100vh;
    }

    .bg-shell{
      position:fixed;
      inset:0;
      z-index:-20;
      pointer-events:none;
      overflow:hidden;
      background:
        radial-gradient(1600px 1200px at 50% 120%, rgba(0,0,0,.82), transparent 70%),
        linear-gradient(180deg,#071018 0%,#030910 36%,#010307 100%);
    }

    #liquidCanvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      opacity:.74;
    }

    .bg-grain{
      position:absolute;
      inset:0;
      background:url("https://grainy-gradients.vercel.app/noise.png");
      opacity:.03;
      mix-blend-mode:overlay;
    }

    .bg-vignette{
      position:absolute;
      inset:0;
      box-shadow:
        inset 0 0 360px rgba(0,0,0,.84),
        inset 0 0 54px rgba(255,255,255,.008);
    }

    .cursor-core{
      position:fixed;
      width:7px;
      height:7px;
      border-radius:50%;
      background:#eef7ff;
      transform:translate(-50%,-50%);
      pointer-events:none;
      z-index:9999;
      box-shadow:
        0 0 10px rgba(212,238,255,.9),
        0 0 28px rgba(150,205,255,.55),
        0 0 64px rgba(150,205,255,.22);
    }

    .cursor-trail{
      position:fixed;
      width:28px;
      height:28px;
      border-radius:50%;
      transform:translate(-50%,-50%);
      background:radial-gradient(circle, rgba(150,205,255,.18), transparent 70%);
      filter:blur(6px);
      pointer-events:none;
      z-index:9998;
    }

    .cursor-particle{
      position:fixed;
      width:2px;
      height:2px;
      border-radius:50%;
      background:rgba(230,240,255,.95);
      pointer-events:none;
      z-index:9997;
      animation:cursorFade .9s ease-out forwards;
      box-shadow:0 0 6px rgba(162,224,255,.35);
    }

    @keyframes cursorFade{
      0%{opacity:.9;transform:translate(0,0) scale(1)}
      100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.2)}
    }

    .topbar{
      position:fixed;
      inset:0 0 auto 0;
      height:var(--topbar-h);
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.32);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,.04);
      z-index:100;
      transition:background .3s ease,border-color .3s ease;
    }

    .topbar.is-scrolled{
      background:rgba(0,0,0,.56);
      border-bottom-color:rgba(255,255,255,.05);
    }

    .topbar-inner{
      width:min(1280px,calc(100% - 40px));
      height:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      position:relative;
    }

    .brand-mini{
      font-size:11px;
      letter-spacing:.22em;
      text-transform:uppercase;
      text-decoration:none;
      color:rgba(232,226,214,.82);
      position:relative;
      z-index:3;
    }

    .nav{
      display:flex;
      gap:22px;
      flex-wrap:wrap;
      justify-content:center;
      padding-inline:16px;
      position:relative;
      z-index:3;
    }

    .nav a{
      color:rgba(232,226,214,.88);
      text-decoration:none;
      text-transform:uppercase;
      letter-spacing:.2em;
      font-size:11px;
      position:relative;
      transition:transform .2s ease,opacity .2s ease;
    }

    .nav a::after{
      content:"";
      position:absolute;
      left:0;
      bottom:-6px;
      width:100%;
      height:1px;
      background:linear-gradient(90deg, rgba(160,220,255,.8), transparent);
      transform:scaleX(0);
      transform-origin:left;
      transition:transform .2s ease;
    }

    .nav a:hover{opacity:1;transform:translateY(-1px)}
    .nav a:hover::after{transform:scaleX(1)}

    .topbar-wordmark{
      position:absolute;
      left:50%;
      top:50%;
      transform:
        translate(-50%,-50%)
        scale(calc(.18 + var(--dock-progress) * .09));
      transform-origin:center center;
      opacity:calc(var(--dock-progress) * .98);
      pointer-events:none;
      z-index:2;
      white-space:nowrap;
    }

    .hero{
      min-height:112vh;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding-top:92px;
      margin-bottom:-18px;
    }

    .hero-sticky{
      position:sticky;
      top:10vh;
      width:min(1120px,calc(100% - 40px));
    }

    .hero-inner{
      display:grid;
      gap:24px;
      transform:
        translateY(calc(var(--dock-progress) * -54px))
        scale(calc(1 - var(--dock-progress) * .18));
      transform-origin:left top;
      opacity:calc(1 - var(--dock-progress) * .96);
      will-change:transform,opacity;
    }

    .wordmark{
      display:flex;
      gap:6px;
      flex-wrap:nowrap;
      user-select:none;
      position:relative;
      overflow:visible;
      isolation:isolate;
    }

    .wordmark::before{
      content:"";
      position:absolute;
      left:var(--hero-glow-x);
      top:52%;
      width:360px;
      height:220px;
      transform:translate(-50%,-50%);
      background:
        radial-gradient(
          ellipse at center,
          rgba(196,232,255,.18) 0%,
          rgba(178,196,255,.12) 24%,
          rgba(255,226,180,.06) 44%,
          transparent 74%
        );
      filter:blur(32px);
      opacity:0;
      transition:opacity .18s ease;
      pointer-events:none;
      z-index:0;
    }

    .wordmark.is-active::before{opacity:1}

    .wordmark span{
      font-family:Oswald,sans-serif;
      font-weight:400;
      font-size:clamp(6.6rem,13.4vw,12.4rem);
      line-height:.84;
      letter-spacing:.05em;
      color:transparent;
      background:
        linear-gradient(
          112deg,
          #89aecd 0%,
          #f6f0e5 14%,
          #ffffff 22%,
          #d9cbbb 40%,
          #f4ead8 56%,
          #a6a0be 74%,
          #e0c8aa 100%
        );
      -webkit-background-clip:text;
      background-clip:text;
      position:relative;
      transition:text-shadow .22s ease,filter .22s ease,transform .22s ease;
      filter:
        drop-shadow(0 1px 0 rgba(255,255,255,.14))
        drop-shadow(0 12px 22px rgba(0,0,0,.32));
      z-index:1;
      overflow:visible;
    }

    .wordmark span::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(
          180deg,
          rgba(255,255,255,.3) 0%,
          rgba(255,255,255,.08) 22%,
          rgba(0,0,0,.08) 70%,
          rgba(0,0,0,.16) 100%
        );
      -webkit-background-clip:text;
      background-clip:text;
      mix-blend-mode:screen;
      opacity:.28;
      pointer-events:none;
    }

    .wordmark span::after{
      content:"";
      position:absolute;
      inset:-20px -24px;
      background:
        linear-gradient(
          90deg,
          transparent 0%,
          rgba(255,255,255,.08) 28%,
          rgba(255,255,255,.36) 50%,
          rgba(255,255,255,.08) 72%,
          transparent 100%
        );
      transform:translateX(-220%) skewX(-18deg);
      opacity:0;
      mix-blend-mode:screen;
      pointer-events:none;
      border-radius:28px;
    }

    .wordmark span.glow{
      text-shadow:
        0 0 16px rgba(182,230,255,.96),
        0 0 42px rgba(162,224,255,.68),
        0 0 116px rgba(148,168,255,.48);
      filter:
        brightness(1.24)
        drop-shadow(0 1px 0 rgba(255,255,255,.16))
        drop-shadow(0 20px 30px rgba(0,0,0,.3));
      transform:translateY(-2px);
    }

    .wordmark span.glow::after{
      opacity:1;
      animation:sheen .6s cubic-bezier(.22,1,.36,1);
    }

    @keyframes sheen{
      0%{transform:translateX(-220%) skewX(-18deg)}
      100%{transform:translateX(320%) skewX(-18deg)}
    }

    .hero-kicker{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      max-width:920px;
    }

    .hero-chip{
      padding:14px 16px;
      border-radius:999px;
      border:1px solid var(--gold);
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.004)),
        rgba(14,19,28,.52);
      color:rgba(233,225,212,.92);
      font-size:11px;
      letter-spacing:.18em;
      text-transform:uppercase;
      text-decoration:none;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.06),
        0 12px 30px rgba(0,0,0,.18);
      transition:transform .2s ease,border-color .2s ease;
    }

    .hero-chip:hover{
      transform:translateY(-2px);
      border-color:var(--gold-strong);
    }

    .section{
      width:min(1120px,calc(100% - 40px));
      margin-inline:auto;
    }

    .panel{
      margin:96px auto 120px;
      padding:38px;
      border-radius:18px;
      border:1px solid var(--gold);
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba
