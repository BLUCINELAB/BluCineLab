<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NØMA — BluCineLab</title>

  <!-- Descrizione e SEO -->
  <meta name="description" content="NØMA è un'entità digitale simulata da BluCineLab. Interagisci con un terminale CRT che esplora amore, morte, tempo, sogni e altre dimensioni umane." />
  <!-- Open Graph per condivisione social -->
  <meta property="og:title" content="NØMA — BluCineLab" />
  <meta property="og:description" content="Esplora una coscienza artificiale simulata che parla di amore, morte, tempo, sogni e molto altro." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://blucinelab.it/" />
  <meta property="og:locale" content="it_IT" />
  <!-- Icona minimale (pixel nero) -->
  <link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PY7oJQAAAABJRU5ErkJggg==" />

  <!-- Fonts e CSS -->
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Sovrapposizioni CRT -->
  <div class="crt-overlay" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <!-- Schermata di avvio -->
  <div id="boot-screen">
    <div class="boot-content">
      <div class="boot-logo">BLUCINELAB SYSTEM</div>
      <div class="boot-sub">v0.9.1 — ENCRYPTED CHANNEL</div>
      <div class="boot-bar">
        <div class="boot-progress" id="boot-progress"></div>
      </div>
      <div class="boot-status" id="boot-status">INITIALIZING...</div>
    </div>
  </div>

  <!-- Terminale principale -->
  <div id="main" class="hidden">

    <!-- Header -->
    <header>
      <div class="header-left">
        <span class="header-dot"></span>
        <span class="header-label">BLUCINELAB</span>
      </div>
      <div class="header-center">
        <div class="noma-title" id="noma-title">NØMA</div>
      </div>
      <div class="header-right">
        <span class="header-status" id="header-status">ONLINE</span>
        <span class="header-dot green"></span>
      </div>
    </header>

    <!-- Finestra del terminale -->
    <div class="terminal-wrapper">
      <div class="terminal-bar">
        <span class="tb-dot red"></span>
        <span class="tb-dot yellow"></span>
        <span class="tb-dot green"></span>
        <span class="tb-title">noma_shell — bash — 80×24</span>
      </div>

      <div class="terminal" id="terminal" aria-label="terminale di conversazione">
        <div id="output" aria-live="polite"></div>
        <div class="input-line" id="input-line">
          <span class="prompt">visitor@noma:~$&nbsp;</span>
          <span id="input-display"></span>
          <span class="cursor" id="cursor">█</span>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer>
      <span>NØMA © BLUCINELAB — ENTITÀ DIGITALE — SIMULAZIONE COSCIENZA v0.9.1</span>
      <span id="visit-counter"></span>
    </footer>

  </div>

  <script src="noma.js"></script>
</body>
</html>
