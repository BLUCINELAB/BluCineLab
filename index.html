<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BLUCINELAB OS PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">

<style>

/* ---------- BASE ---------- */

body{
margin:0;
overflow:hidden;
font-family:Tahoma;
}

#desktop{
position:fixed;
inset:0;
background:linear-gradient(#87b4ff,#5c93e8 40%,#4f8a2e 41%,#67b63b);
}

/* ---------- WINDOW ---------- */

.win{
position:fixed;
background:#ece9d8;
border:2px solid #0a246a;
display:flex;
flex-direction:column;
}

.win-titlebar{
background:#245edb;
color:white;
padding:4px;
display:flex;
justify-content:space-between;
}

.win-body{
flex:1;
overflow:auto;
padding:10px;
}

/* ---------- FULL ---------- */

.world{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
}

/* ---------- RAIL ---------- */

.rail{

position:absolute;

left:0;
top:0;
bottom:0;

width:70px;

background:black;
color:white;

display:flex;
flex-direction:column;
align-items:center;

}

/* ---------- NANO ---------- */

.nano{

position:absolute;
bottom:10px;
left:10px;

font-size:40px;

animation:walk 1s infinite;

}

@keyframes walk{

0%{transform:translateX(0)}
50%{transform:translateX(5px)}
100%{transform:translateX(0)}

}


/* ---------- ARCHIVE GTA ---------- */

.archive{

background:#111;
color:#ff66cc;

}


/* ---------- LAB BIOS ---------- */

.lab{

background:black;
color:#00ff66;
font-family:monospace;

}


/* ---------- STUDIO SIMS ---------- */

.studio{

background:#d0ffe0;

}


/* ---------- PLAYROOM WII ---------- */

.playroom{

background:white;
color:#222;
font-family:sans-serif;

}


/* ---------- GALLERY GLITCH ---------- */

.gallery{

background:black;
color:cyan;
font-family:monospace;

}


/* ---------- CONTACT ---------- */

.contact{

background:#f0f0f0;

}


/* ---------- MANIFEST ---------- */

.manifest{

background:#ffffcc;
font-family:monospace;

}

</style>

</head>
<body>


<div id="desktop"></div>


<!-- HOME -->

<div class="win" style="top:60px;left:100px;width:400px">

<div class="win-titlebar">

HOME

</div>

<div class="win-body">

XP HOME

<div class="nano">🙂</div>

</div>

</div>



<!-- ARCHIVE -->

<div class="world archive">

<div class="rail">

<button onclick="hide('archive')">X</button>

</div>

ARCHIVE GTA

<div class="nano">😎</div>

</div>



<!-- LAB -->

<div class="world lab">

<div class="rail">

<button onclick="hide('lab')">X</button>

</div>

LAB BIOS

<div class="nano">🤖</div>

</div>



<!-- STUDIO -->

<div class="world studio">

<div class="rail">

<button onclick="hide('studio')">X</button>

</div>

STUDIO SIMS

<div class="nano">🧑</div>

</div>



<!-- PLAYROOM -->

<div class="world playroom" id="playroom">

<div class="rail">

<button onclick="hide('playroom')">X</button>

</div>

PLAYROOM WII HUB

<div class="nano">🎮</div>

</div>



<!-- GALLERY -->

<div class="world gallery">

<div class="rail">

<button onclick="hide('gallery')">X</button>

</div>

GLITCH

<div class="nano">👾</div>

</div>



<!-- CONTACT -->

<div class="world contact">

<div class="rail">

<button onclick="hide('contact')">X</button>

</div>

CONTACT

<div class="nano">📧</div>

</div>



<!-- MANIFEST -->

<div class="world manifest">

<div class="rail">

<button onclick="hide('manifest')">X</button>

</div>

MANIFEST

<div class="nano">📜</div>

</div>



<script>

function hide(id){

document.getElementById(id).style.display="none"

}

</script>

</body>
</html>
