<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BluCineLab</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300&family=Inter:wght@200;300&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#02040a;
font-family:Inter;
color:#e6e3da;
overflow-x:hidden;
cursor:none;
}



/* LIQUID CANVAS */

#liquid{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

z-index:-3;

}



/* PARTICLE FIELD */

.particle-layer{

position:fixed;
inset:0;
pointer-events:none;

z-index:-2;

}

.particle{

position:absolute;

width:2px;
height:2px;

background:#cde8ff;

border-radius:50%;

opacity:.8;

animation:particleFloat linear infinite;

}

@keyframes particleFloat{

0%{transform:translateY(0)}
100%{transform:translateY(-100vh)}

}



/* CURSOR */

.cursor-core{

position:fixed;

width:6px;
height:6px;

background:#e7f6ff;

border-radius:50%;

pointer-events:none;

transform:translate(-50%,-50%);

z-index:1000;

box-shadow:
0 0 10px #c8ecff,
0 0 25px #9fd6ff,
0 0 60px #9fd6ff;

}

.cursor-trail{

position:fixed;

width:20px;
height:20px;

background:radial-gradient(circle,#9fd6ff33,transparent);

border-radius:50%;

pointer-events:none;

transform:translate(-50%,-50%);

filter:blur(4px);

z-index:999;

}



/* HERO */

.hero{

min-height:120vh;

display:flex;
align-items:center;
justify-content:center;

}

.hero-inner{

width:900px;
max-width:90%;

}



.wordmark{

font-family:Oswald;
font-weight:200;

font-size:140px;

letter-spacing:12px;

display:flex;
gap:4px;

margin-bottom:30px;

}

.wordmark span{

transition:.3s;

}

.wordmark span.glow{

text-shadow:

0 0 10px #9fd6ff,
0 0 40px #9fd6ff,
0 0 80px #9fd6ff;

}



.hero-lead{

max-width:420px;

line-height:2.2;

font-size:14px;

color:#cfc9bb;

}



/* EDITORIAL BLOCK */

.editorial-block{

width:900px;
max-width:90%;

margin:160px auto;

display:grid;

grid-template-columns:1fr 1fr;

gap:80px;

align-items:center;

}

.editorial-block img{

width:100%;

border-radius:12px;

}



/* DISCIPLINES */

.disciplines{

width:900px;
max-width:90%;

margin:140px auto;

display:grid;

grid-template-columns:repeat(4,1fr);

gap:40px;

}

.discipline h3{

font-family:Oswald;

font-weight:300;

margin-bottom:10px;

}

.discipline p{

font-size:13px;

line-height:2;

color:#cfc9bb;

}



/* VISUAL BREAK */

.visual-break{

margin:200px 0;

}

.visual-break img{

width:100%;

}



/* ARCHIVE */

.archive-film{

margin:200px 0;

}

.film-track{

display:flex;

gap:40px;

padding:0 120px;

}

.film-track img{

width:320px;

border-radius:12px;

}



/* RESEARCH */

.research-lab{

width:900px;
max-width:90%;

margin:200px auto;

}

.research-grid{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:30px;

margin-top:40px;

}

.research-grid img{

width:100%;

border-radius:10px;

}



/* FOOTER */

footer{

text-align:center;

padding:120px 0;

color:#777;

font-size:12px;

}

</style>

</head>

<body>



<canvas id="liquid"></canvas>

<div class="particle-layer"></div>

<div class="cursor-core"></div>
<div class="cursor-trail"></div>



<section class="hero">

<div class="hero-inner">

<h1 class="wordmark">

<span>B</span>
<span>L</span>
<span>U</span>
<span>C</span>
<span>I</span>
<span>N</span>
<span>E</span>
<span>L</span>
<span>A</span>
<span>B</span>

</h1>

<p class="hero-lead">

Studio visivo indipendente che lavora tra immagine,
spazio e narrazione.

</p>

</div>

</section>



<script>



/* CURSOR */

const core=document.querySelector(".cursor-core")
const trail=document.querySelector(".cursor-trail")

let mx=0
let my=0
let tx=0
let ty=0

document.addEventListener("mousemove",e=>{

mx=e.clientX
my=e.clientY

core.style.left=mx+"px"
core.style.top=my+"px"

})

function animate(){

tx+=(mx-tx)*0.18
ty+=(my-ty)*0.18

trail.style.left=tx+"px"
trail.style.top=ty+"px"

requestAnimationFrame(animate)

}

animate()



/* LIQUID BACKGROUND */

const canvas=document.getElementById("liquid")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let blobs=[]

for(let i=0;i<8;i++){

blobs.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:250+Math.random()*200,
dx:(Math.random()-.5)*0.4,
dy:(Math.random()-.5)*0.4

})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

blobs.forEach(b=>{

b.x+=b.dx
b.y+=b.dy

if(b.x>canvas.width||b.x<0)b.dx*=-1
if(b.y>canvas.height||b.y<0)b.dy*=-1

let g=ctx.createRadialGradient(
b.x,b.y,0,
b.x,b.y,b.r
)

g.addColorStop(0,"rgba(120,150,200,.12)")
g.addColorStop(1,"transparent")

ctx.fillStyle=g
ctx.beginPath()
ctx.arc(b.x,b.y,b.r,0,Math.PI*2)
ctx.fill()

})

requestAnimationFrame(draw)

}

draw()



/* PARTICLES */

const field=document.querySelector(".particle-layer")

for(let i=0;i<120;i++){

let p=document.createElement("div")

p.className="particle"

p.style.left=Math.random()*100+"%"
p.style.top=Math.random()*100+"%"
p.style.animationDuration=(8+Math.random()*12)+"s"

field.appendChild(p)

}



</script>

</body>

</html>
