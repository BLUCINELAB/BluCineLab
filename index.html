<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BluCineLab</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

/* ---------- BASE ---------- */

body{
margin:0;
font-family:Inter,sans-serif;
background:#02050a;
color:#e8e2d7;
overflow-x:hidden;
cursor:none;
}

/* ---------- BACKGROUND ---------- */

.bg{
position:fixed;
inset:0;
z-index:-10;

background:
radial-gradient(1200px 800px at 50% 110%,rgba(0,0,0,0.9),transparent),
linear-gradient(180deg,#071018,#030910,#010307);
}

canvas{
position:absolute;
inset:0;
width:100%;
height:100%;
}

/* ---------- CURSOR ---------- */

.cursor{
position:fixed;
width:6px;
height:6px;
border-radius:50%;
background:white;
pointer-events:none;
transform:translate(-50%,-50%);
z-index:9999;

box-shadow:
0 0 6px white,
0 0 16px rgba(150,210,255,.8),
0 0 40px rgba(150,210,255,.6);
}

.cursorTrail{
position:fixed;
width:24px;
height:24px;
border-radius:50%;
background:
radial-gradient(circle,
rgba(200,230,255,.25),
transparent);

pointer-events:none;
transform:translate(-50%,-50%);
z-index:9998;
}

/* ---------- HERO ---------- */

.hero{
height:80vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.hero h1{

font-family:Oswald;
font-size:clamp(4rem,8vw,7rem);
letter-spacing:.07em;

background:
linear-gradient(
120deg,
#8fb7d6,
#ffffff,
#e6d9c8,
#ffffff,
#8fb7d6);

-webkit-background-clip:text;
color:transparent;

text-shadow:
0 0 6px rgba(180,220,255,.5),
0 0 14px rgba(180,220,255,.35);

}

/* ---------- NAV ---------- */

.nav{
position:fixed;
top:20px;
right:40px;
display:flex;
gap:18px;
font-size:12px;
letter-spacing:.15em;
text-transform:uppercase;
}

.nav a{
color:#e8e2d7;
text-decoration:none;
position:relative;
}

.nav a::after{
content:"";
position:absolute;
bottom:-6px;
left:0;
width:100%;
height:1px;
background:linear-gradient(90deg,#9cd2ff,transparent);
transform:scaleX(0);
transition:.2s;
}

.nav a:hover::after{
transform:scaleX(1);
}

/* ---------- SECTIONS ---------- */

.section{
max-width:1200px;
margin:auto;
padding:120px 20px;

opacity:0;
transform:translateY(40px);
transition:1s;
}

.section.visible{
opacity:1;
transform:none;
}

/* ---------- GRID ---------- */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:26px;
}

.card{

border:1px solid rgba(208,178,122,.35);
border-radius:18px;
overflow:hidden;

background:
linear-gradient(rgba(255,255,255,.02),rgba(255,255,255,.01)),
rgba(10,15,22,.8);

box-shadow:
0 18px 50px rgba(0,0,0,.2),
inset 0 1px 0 rgba(255,255,255,.03);

transition:.35s;

}

.card:hover{
transform:translateY(-6px) scale(1.01);
border-color:rgba(230,198,140,.7);
box-shadow:0 26px 70px rgba(0,0,0,.35);
}

.card img{
width:100%;
height:260px;
object-fit:cover;
filter:brightness(.9);
transition:.4s;
}

.card:hover img{
transform:scale(1.04);
filter:brightness(1);
}

.cardBody{
padding:20px;
}

.cardTitle{
font-family:Oswald;
font-size:1.2rem;
letter-spacing:.06em;
}

.cardText{
font-size:.9rem;
line-height:1.8;
color:rgba(220,212,198,.8);
}

/* ---------- MOBILE ---------- */

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

body{
cursor:auto;
}

.cursor,
.cursorTrail{
display:none;
}

}

</style>
</head>

<body>

<div class="bg">
<canvas id="bgCanvas"></canvas>
</div>

<div class="cursor"></div>
<div class="cursorTrail"></div>

<nav class="nav">
<a href="#">Home</a>
<a href="#">Archive</a>
<a href="#">Studio</a>
<a href="#">Team</a>
<a href="#">Contact</a>
</nav>

<section class="hero">
<h1>BluCineLab</h1>
</section>

<section class="section">

<div class="grid">

<div class="card">

<img src="https://images.unsplash.com/photo-1485846234645-a62644f84728">

<div class="cardBody">
<div class="cardTitle">Cinema Production</div>
<div class="cardText">Set design e produzione scenografica.</div>
</div>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3">

<div class="cardBody">
<div class="cardTitle">Digital Systems</div>
<div class="cardText">Progetti web e sistemi visivi.</div>
</div>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30">

<div class="cardBody">
<div class="cardTitle">Spatial Events</div>
<div class="cardText">Mostre, allestimenti e installazioni.</div>
</div>

</div>

</div>

</section>

<script>

/* ----- CURSOR ----- */

const cursor=document.querySelector(".cursor")
const trail=document.querySelector(".cursorTrail")

let mx=window.innerWidth/2
let my=window.innerHeight/2

let tx=mx
let ty=my

window.addEventListener("mousemove",e=>{

mx=e.clientX
my=e.clientY

cursor.style.left=mx+"px"
cursor.style.top=my+"px"

})

function animate(){

tx+=(mx-tx)*0.18
ty+=(my-ty)*0.18

trail.style.left=tx+"px"
trail.style.top=ty+"px"

requestAnimationFrame(animate)

}

animate()

/* ----- SECTION REVEAL ----- */

const sections=document.querySelectorAll(".section")

const observer=new IntersectionObserver(entries=>{
entries.forEach(e=>{
if(e.isIntersecting){
e.target.classList.add("visible")
}
})
},{threshold:.2})

sections.forEach(sec=>observer.observe(sec))

/* ----- BACKGROUND LIQUID ----- */

const canvas=document.getElementById("bgCanvas")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}

resize()

window.addEventListener("resize",resize)

let blobs=[]

for(let i=0;i<10;i++){

blobs.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:200+Math.random()*400,
dx:(Math.random()-.5)*.2,
dy:(Math.random()-.5)*.2

})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.globalCompositeOperation="screen"

for(let b of blobs){

b.x+=b.dx
b.y+=b.dy

const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r)

g.addColorStop(0,"rgba(200,220,255,.1)")
g.addColorStop(.4,"rgba(160,200,255,.05)")
g.addColorStop(1,"transparent")

ctx.fillStyle=g

ctx.beginPath()
ctx.arc(b.x,b.y,b.r,0,Math.PI*2)
ctx.fill()

}

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
