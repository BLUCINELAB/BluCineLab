<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>BLUCINE OS</title>

<link rel="stylesheet" href="style.css">

</head>
<body>


<!-- ======================
BOOT
====================== -->

<div id="bootScreen">
    <div>BLUCINE SYSTEM</div>
    <div class="bar">
        <div id="bootBar"></div>
    </div>
</div>



<!-- ======================
DESKTOP XP
====================== -->

<div id="desktop">


<!-- ICONS -->

<div class="icon" onclick="openWindow('archive')">
📁 ARCHIVE
</div>

<div class="icon" onclick="openWindow('lab')">
🖥 LAB
</div>

<div class="icon" onclick="openWindow('playroom')">
🎮 PLAYROOM
</div>


</div>



<!-- ======================
START BAR
====================== -->

<div id="taskbar">

<div id="startBtn" onclick="toggleStart()">START</div>

</div>



<div id="startMenu">

<div onclick="openWindow('archive')">ARCHIVE</div>
<div onclick="openWindow('lab')">LAB</div>
<div onclick="openWindow('playroom')">PLAYROOM</div>

</div>



<!-- ======================
ARCHIVE
====================== -->

<div class="window fullscreen" id="archive">

<div class="title">
ARCHIVE
<span onclick="closeWindow('archive')">X</span>
</div>

<div class="content">

ARCHIVE SYSTEM

</div>

</div>



<!-- ======================
LAB
====================== -->

<div class="window fullscreen" id="lab">

<div class="title">
LAB SYSTEM
<span onclick="closeWindow('lab')">X</span>
</div>

<div class="content">

<pre>

MR BIOS 1991

READY

</pre>

</div>

</div>



<!-- ======================
PLAYROOM
====================== -->

<div class="window fullscreen playroom" id="playroom">

<div class="title">
PLAYROOM
<span onclick="closeWindow('playroom')">X</span>
</div>


<div class="nano">

👾 HELLO  
WELCOME TO PLAYROOM

</div>


<div class="games">

<div class="game">PACMAN</div>

<div class="game">SPACE</div>

<div class="game">MARIO</div>

<div class="game">COOKING</div>

<div class="game">SIMS</div>

</div>


</div>



<!-- ======================
SCRIPT
====================== -->

<script>


function openWindow(id){

document.getElementById(id).style.display="block"

}


function closeWindow(id){

document.getElementById(id).style.display="none"

}


function toggleStart(){

let m=document.getElementById("startMenu")

if(m.style.display=="block"){

m.style.display="none"

}else{

m.style.display="block"

}

}



window.onload=function(){

setTimeout(()=>{

document.getElementById("bootScreen").style.display="none"

},4000)

}


</script>


</body>
</html>
