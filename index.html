<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BLUCINELAB OS</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
font-family:Tahoma;
}

#desktop{
position:fixed;
inset:0;
background:linear-gradient(#87b4ff,#5c93e8 40%,#4f8a2e 41%,#67b63b);
}

.win{
position:fixed;
background:#ece9d8;
border:2px solid #0a246a;
display:flex;
flex-direction:column;
}

.win-titlebar{
background:#245edb;
color:white;
padding:4px;
}

.win-body{
flex:1;
overflow:hidden;
}

.world-fullscreen{
top:0;
left:0;
width:100vw;
height:100vh;
border:0;
}

.world-rail{
position:absolute;
left:0;
top:0;
bottom:0;
width:70px;
background:black;
color:white;
}

.playroom-body{
background:#001133;
color:white;
font-family:"Press Start 2P";
}

/* menu */

.game-menu button{
display:block;
margin:10px;
padding:10px;
font-family:"Press Start 2P";
}

.game-screen{
display:none;
height:100%;
}

.active{
display:block;
}


/* MARIO */

#mario{

background:#6bd3ff;
position:relative;
overflow:hidden;

}

.mario-ground{

position:absolute;
bottom:0;
height:100px;
width:100%;
background:#5ab43c;

}

.mario-player{

position:absolute;
bottom:100px;
left:100px;

font-size:40px;

}


/* cooking */

#cooking{
background:pink;
}

/* invaders */

#invaders{
background:black;
color:lime;
}

/* tama */

#tama{
background:white;
color:black;
}

</style>

</head>
<body>

<div id="desktop"></div>



<div class="win world-fullscreen" id="playroom">

<div class="world-rail">

<button onclick="closeWin()">X</button>

</div>

<div class="win-titlebar">

PLAYROOM

</div>


<div class="win-body playroom-body">


<div class="game-menu">

<button onclick="openGame('menu')">MENU</button>
<button onclick="openGame('mario')">MARIO</button>
<button onclick="openGame('cooking')">COOKING</button>
<button onclick="openGame('invaders')">INVADERS</button>
<button onclick="openGame('tama')">TAMA</button>

</div>



<div id="menu" class="game-screen active">

SELECT GAME

</div>



<div id="mario" class="game-screen">

<div id="player" class="mario-player">🙂</div>

<div class="mario-ground"></div>

</div>



<div id="cooking" class="game-screen">

COOKING GAME

</div>



<div id="invaders" class="game-screen">

SPACE INVADERS

</div>



<div id="tama" class="game-screen">

TAMAGOTCHI

</div>



</div>

</div>



<script>

function closeWin(){

document.getElementById("playroom").style.display="none"

}


function openGame(id){

document.querySelectorAll(".game-screen").forEach(g=>g.classList.remove("active"))

document.getElementById(id).classList.add("active")

}



/* MARIO MOVEMENT */

let player=document.getElementById("player")

let x=100
let y=0
let vy=0

let jumping=false

document.addEventListener("keydown",e=>{

if(document.getElementById("mario").classList.contains("active")){

if(e.key=="ArrowRight") x+=10
if(e.key=="ArrowLeft") x-=10

if(e.key==" " && !jumping){

vy=15
jumping=true

}

player.style.left=x+"px"

}

})


function loop(){

if(jumping){

y+=vy
vy-=1

if(y<=0){

y=0
jumping=false

}

player.style.bottom=100+y+"px"

}

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
