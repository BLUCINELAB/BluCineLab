<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BLUCINELAB OS</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
font-family:Tahoma;
}

#desktop{
position:fixed;
inset:0;
background:linear-gradient(#87b4ff,#5c93e8 40%,#4f8a2e 41%,#67b63b);
}

.win{
position:fixed;
background:#ece9d8;
border:2px solid #0a246a;
display:flex;
flex-direction:column;
}

.win-titlebar{
background:#245edb;
color:white;
padding:4px;
display:flex;
justify-content:space-between;
}

.win-body{
flex:1;
overflow:auto;
padding:10px;
}

.world-fullscreen{
top:30px;
left:0;
width:100vw;
height:calc(100vh - 60px);
border:0;
}

.world-rail{
position:absolute;
left:0;
top:0;
bottom:0;
width:70px;
background:black;
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

.nano{
position:absolute;
bottom:10px;
left:10px;
font-size:40px;
animation:walk 1s infinite;
}

@keyframes walk{
0%{transform:translateX(0)}
50%{transform:translateX(5px)}
100%{transform:translateX(0)}
}


/* PLAYROOM */

.playroom-body{
background:#001133;
color:white;
font-family:"Press Start 2P";
}


.game-menu button{

display:block;
margin:10px;
padding:10px;
font-family:"Press Start 2P";

}


.game-screen{
display:none;
height:100%;
}

.active{
display:block;
}


/* mario */

#mario{

background:#6bd3ff;
position:relative;

}

.mario-ground{

position:absolute;
bottom:0;
height:100px;
width:100%;
background:#5ab43c;

}

.mario-player{

position:absolute;
bottom:100px;
left:40px;
font-size:40px;

}


/* cooking */

#cooking{

background:pink;

}


/* invaders */

#invaders{

background:black;
color:lime;

}


/* tama */

#tama{

background:#fff;
color:black;

}

</style>

</head>
<body>

<div id="desktop"></div>


<!-- PLAYROOM -->

<div class="win world-fullscreen" id="playroom">

<div class="world-rail">

<button onclick="closeWin('playroom')">X</button>

</div>

<div class="win-titlebar">

PLAYROOM

</div>

<div class="win-body playroom-body">

<div class="game-menu">

<button onclick="openGame('menu')">MENU</button>

<button onclick="openGame('mario')">SUPER MARIO</button>

<button onclick="openGame('cooking')">COOKING</button>

<button onclick="openGame('invaders')">INVADERS</button>

<button onclick="openGame('tama')">TAMAGOTCHI</button>

</div>



<div id="menu" class="game-screen active">

SELECT GAME

</div>


<div id="mario" class="game-screen">

<div class="mario-player">🙂</div>

<div class="mario-ground"></div>

</div>



<div id="cooking" class="game-screen">

COOKING GAME

</div>



<div id="invaders" class="game-screen">

SPACE INVADERS

</div>



<div id="tama" class="game-screen">

TAMAGOTCHI

</div>



<div class="nano">🎮</div>

</div>

</div>



<script>

function closeWin(id){

document.getElementById(id).style.display="none"

}

function openGame(id){

document.querySelectorAll(".game-screen").forEach(g=>g.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

</script>

</body>
</html>
