<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLUCINELAB — XP Desktop / GTA Archive</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: Tahoma, Arial, sans-serif;
      background: #245edb;
      user-select: none;
    }

    :root{
      --xp-blue-1:#245edb;
      --xp-blue-2:#1f59d4;
      --xp-blue-3:#1949b2;
      --xp-taskbar:#2458c7;
      --xp-taskbar-dark:#123b97;
      --xp-green:#2ca94f;
      --shadow: 0 18px 44px rgba(0,0,0,.45);
    }

    .hidden { display: none !important; }

    /* DESKTOP */
    #desktop {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,.17), transparent 28%),
        linear-gradient(180deg, #66a9ff 0%, #3d83e0 26%, #2d69c8 55%, #1b4fa5 100%);
    }

    .desktop-wallpaper-hill {
      position: absolute;
      left: -10vw;
      right: -10vw;
      bottom: 28px;
      height: 44vh;
      background:
        radial-gradient(110% 120% at 50% 100%, #66c64f 0 42%, transparent 43%),
        radial-gradient(95% 90% at 58% 100%, #53b43f 0 37%, transparent 38%);
      filter: saturate(1.05);
    }

    .desktop-icon {
      position: absolute;
      width: 88px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      color: white;
      text-align: center;
      cursor: pointer;
    }

    .desktop-icon .icon-art {
      width: 46px;
      height: 46px;
      border-radius: 8px;
      background:
        linear-gradient(180deg,#fff 0%,#d7ebff 100%);
      border: 1px solid rgba(0,0,0,.18);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.8),
        0 2px 5px rgba(0,0,0,.15);
      position: relative;
    }

    .desktop-icon .icon-art::before,
    .desktop-icon .icon-art::after{
      content:"";
      position:absolute;
      background:#f3c316;
      border:1px solid rgba(0,0,0,.16);
    }

    .desktop-icon.folder .icon-art::before{
      width: 20px;
      height: 8px;
      left: 5px;
      top: 7px;
      border-bottom: none;
      border-radius: 4px 4px 0 0;
      background: #f8d667;
    }

    .desktop-icon.folder .icon-art::after{
      width: 34px;
      height: 22px;
      left: 5px;
      top: 14px;
      border-radius: 4px;
      background: linear-gradient(180deg,#f8da6d 0%, #e2b517 100%);
    }

    .desktop-icon span {
      font-size: 12px;
      line-height: 1.15;
      text-shadow: 1px 1px 2px rgba(0,0,0,.65);
      padding: 2px 4px;
    }

    .desktop-icon.active span {
      background: rgba(10, 36, 106, .55);
      outline: 1px dotted rgba(255,255,255,.75);
    }

    #icon-archive { top: 34px; left: 26px; }
    #icon-shell   { top: 132px; left: 26px; }

    /* TASKBAR */
    #taskbar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 34px;
      background:
        linear-gradient(180deg,#3c78e6 0%, #2b63d2 45%, #2358c3 46%, #194aa8 100%);
      border-top: 1px solid rgba(255,255,255,.35);
      display: flex;
      align-items: stretch;
      z-index: 9999;
    }

    #start-button {
      width: 108px;
      border: none;
      color: white;
      font-weight: 700;
      font-style: italic;
      font-size: 17px;
      background:
        linear-gradient(180deg, #41bb53 0%, #2f9a43 45%, #27893b 46%, #1f7431 100%);
      border-right: 1px solid rgba(0,0,0,.25);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.35);
      cursor: pointer;
      border-radius: 0 10px 10px 0;
    }

    #taskbar-windows {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 8px;
      overflow: auto;
    }

    .taskbar-item {
      min-width: 160px;
      max-width: 220px;
      height: 26px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      border-radius: 3px;
      font-size: 12px;
      color: #fff;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.22);
      cursor: pointer;
      white-space: nowrap;
    }

    .taskbar-item.active {
      background: rgba(255,255,255,.28);
    }

    #taskbar-clock {
      width: 78px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
      background:
        linear-gradient(180deg,#1ea8de 0%, #168dc7 100%);
      border-left: 1px solid rgba(255,255,255,.35);
    }

    /* START MENU */
    #start-menu {
      position: fixed;
      left: 0;
      bottom: 34px;
      width: 360px;
      height: 470px;
      background: #f2f6fb;
      border: 1px solid #0f3f91;
      border-bottom: none;
      box-shadow: 0 24px 40px rgba(0,0,0,.4);
      z-index: 9998;
      overflow: hidden;
    }

    #start-header {
      height: 58px;
      background:
        linear-gradient(180deg,#2b66da 0%, #2156c2 100%);
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 12px;
      font-weight: 700;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 6px;
      background: linear-gradient(180deg,#ffffff 0%, #d8ebff 100%);
      border: 1px solid rgba(0,0,0,.2);
    }

    #start-body {
      display: grid;
      grid-template-columns: 1.2fr .9fr;
      height: calc(100% - 58px);
    }

    .start-col.left {
      background: #fff;
      padding: 12px 0;
    }

    .start-col.right {
      background: #dfe8f7;
      padding: 12px 0;
      border-left: 1px solid #b8c9e9;
    }

    .start-entry {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      font-size: 14px;
      color: #112;
      cursor: pointer;
    }

    .start-entry:hover {
      background: #316ac5;
      color: #fff;
    }

    .start-entry .mini {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      background: linear-gradient(180deg,#fff 0%,#d7ebff 100%);
      border: 1px solid rgba(0,0,0,.15);
      flex: none;
    }

    /* WINDOWS XP WINDOW */
    .window {
      position: fixed;
      background: #ece9d8;
      border: 1px solid #0f3f91;
      border-radius: 8px 8px 0 0;
      box-shadow: var(--shadow);
      overflow: hidden;
      min-width: 320px;
      min-height: 180px;
    }

    .window-topbar {
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6px 0 8px;
      color: white;
      background:
        linear-gradient(180deg,#2d69d6 0%, #2157c3 45%, #1c4db7 46%, #1845a5 100%);
      cursor: move;
    }

    .window-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .2px;
    }

    .window-actions {
      display: flex;
      gap: 4px;
    }

    .window-control {
      width: 22px;
      height: 20px;
      border: 1px solid rgba(255,255,255,.55);
      border-radius: 3px;
      background: linear-gradient(180deg,#f8fafd 0%,#c8dbf7 100%);
      color: #103a8f;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      line-height: 1;
    }

    .window-control.close {
      background: linear-gradient(180deg,#ff8f7f 0%, #df4e2f 100%);
      color: #fff;
    }

    .window-body {
      height: calc(100% - 30px);
      background: #fff;
      overflow: auto;
      padding: 14px;
    }

    /* SHELL WINDOW */
    #win-shell {
      top: 92px;
      left: 160px;
      width: 480px;
      height: 300px;
      z-index: 10;
    }

    .shell-screen {
      width: 100%;
      height: 100%;
      background: #000;
      color: #8cff8c;
      font-family: "Courier New", monospace;
      font-size: 15px;
      padding: 16px;
      line-height: 1.55;
    }

    /* ARCHIVE WINDOW = GTA */
    #win-archive {
      top: 52px;
      left: 120px;
      width: min(1040px, 86vw);
      height: min(720px, 82vh);
      min-width: 720px;
      min-height: 520px;
      background: #000;
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 0;
      box-shadow: 0 28px 70px rgba(0,0,0,.68);
      resize: both;
      overflow: hidden;
      z-index: 20;
    }

    #win-archive .window-topbar {
      height: 34px;
      background:
        linear-gradient(180deg,#2d69d6 0%, #2157c3 45%, #1c4db7 46%, #1845a5 100%);
      border-bottom: 1px solid rgba(0,0,0,.28);
      padding: 0 7px 0 10px;
    }

    #win-archive .window-title {
      font-size: 13px;
      font-weight: 700;
    }

    #win-archive .window-body {
      height: calc(100% - 34px);
      padding: 0;
      background: #000;
      overflow: hidden;
    }

    .vice-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
    }

    .vice-logo {
      position: absolute;
      top: 28px;
      left: 44px;
      z-index: 5;
      font-size: clamp(32px, 4vw, 58px);
      font-style: italic;
      line-height: .88;
      color: #ffd4e9;
      text-transform: lowercase;
      transform: rotate(-8deg);
      letter-spacing: -.5px;
      text-shadow:
        -2px -2px 0 #ff9fd3,
        2px -2px 0 #ff9fd3,
        -2px 2px 0 #ff9fd3,
        2px 2px 0 #ff9fd3,
        0 0 14px rgba(255,122,190,.14);
    }

    .vice-logo::after {
      content: "";
      position: absolute;
      left: 4%;
      bottom: -10px;
      width: 94%;
      height: 6px;
      background: #ff9fd3;
      border-radius: 999px;
      transform: skewX(-30deg);
    }

    .vice-title {
      position: absolute;
      top: 18px;
      right: 44px;
      z-index: 5;
      font-size: clamp(42px, 4.9vw, 78px);
      line-height: .95;
      color: #ee95d0;
      text-transform: lowercase;
      text-shadow:
        3px 3px 0 #a65382,
        0 0 12px rgba(238,149,208,.12);
      letter-spacing: .5px;
    }

    .vice-panel {
      position: absolute;
      left: 50%;
      top: 15.5%;
      width: min(66vw, 800px);
      height: min(56vh, 500px);
      transform: translateX(-50%) rotate(-2.7deg);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04),
        0 24px 48px rgba(0,0,0,.4);
      background-color: #736d7c;
      background-image:
        radial-gradient(circle at 10% 18%, rgba(197,193,205,.45) 0 3.7%, transparent 4.2%),
        radial-gradient(circle at 23% 34%, rgba(197,193,205,.32) 0 4.4%, transparent 4.9%),
        radial-gradient(circle at 42% 21%, rgba(197,193,205,.42) 0 4.1%, transparent 4.8%),
        radial-gradient(circle at 58% 16%, rgba(197,193,205,.3) 0 4.5%, transparent 5.2%),
        radial-gradient(circle at 71% 29%, rgba(197,193,205,.42) 0 3.8%, transparent 4.5%),
        radial-gradient(circle at 84% 16%, rgba(197,193,205,.38) 0 4.2%, transparent 4.9%),
        radial-gradient(circle at 15% 58%, rgba(197,193,205,.36) 0 4.8%, transparent 5.5%),
        radial-gradient(circle at 34% 49%, rgba(197,193,205,.28) 0 4.2%, transparent 4.9%),
        radial-gradient(circle at 47% 62%, rgba(197,193,205,.42) 0 4.6%, transparent 5.3%),
        radial-gradient(circle at 63% 55%, rgba(197,193,205,.28) 0 4.4%, transparent 5.1%),
        radial-gradient(circle at 77% 60%, rgba(197,193,205,.4) 0 4.7%, transparent 5.4%),
        radial-gradient(circle at 89% 49%, rgba(197,193,205,.28) 0 4%, transparent 4.8%),
        radial-gradient(circle at 11% 84%, rgba(197,193,205,.42) 0 4.2%, transparent 5.1%),
        radial-gradient(circle at 27% 75%, rgba(197,193,205,.3) 0 4.7%, transparent 5.4%),
        radial-gradient(circle at 43% 85%, rgba(197,193,205,.44) 0 4.2%, transparent 5.1%),
        radial-gradient(circle at 61% 81%, rgba(197,193,205,.3) 0 4.6%, transparent 5.5%),
        radial-gradient(circle at 76% 87%, rgba(197,193,205,.4) 0 4%, transparent 4.9%),
        radial-gradient(circle at 91% 79%, rgba(197,193,205,.32) 0 4.2%, transparent 5.1%);
      background-size: 100% 100%;
    }

    .vice-menu {
      position: absolute;
      top: 74px;
      left: 50%;
      transform: translateX(-50%) rotate(2.7deg);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      z-index: 4;
    }

    .vice-item {
      border: none;
      background: transparent;
      color: #ef95d1;
      font-family: inherit;
      font-size: clamp(27px, 2.8vw, 44px);
      line-height: 1.03;
      text-transform: lowercase;
      padding: 2px 16px;
      cursor: pointer;
      text-shadow: 2px 2px 0 #87486d;
      letter-spacing: .35px;
    }

    .vice-item.is-active {
      background: #16b36c;
      color: #f8cbe4;
      text-shadow: none;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.15),
        0 0 0 2px rgba(0,0,0,.08);
    }

    .archive-content {
      position: absolute;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      width: min(74vw, 900px);
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 22px;
      z-index: 6;
    }

    .archive-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .archive-card {
      border: none;
      background: rgba(239,149,209,.96);
      color: #250f1d;
      text-align: left;
      padding: 10px 14px;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: 24px;
      line-height: 1;
      text-transform: lowercase;
      cursor: pointer;
      box-shadow: 4px 4px 0 rgba(0,0,0,.36);
    }

    .archive-card.active {
      background: #16b36c;
      color: #fff;
    }

    .archive-folder-view {
      min-height: 230px;
      background: rgba(0,0,0,.78);
      border: 1px solid rgba(255,255,255,.08);
      padding: 16px 18px;
      color: white;
      overflow: auto;
    }

    .archive-folder-title {
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: 34px;
      line-height: 1;
      color: #ef95d1;
      text-transform: lowercase;
      margin-bottom: 14px;
      text-shadow: 2px 2px 0 #87486d;
    }

    .archive-folder-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .archive-link {
      color: rgba(255,255,255,.92);
      text-decoration: none;
      font-family: Tahoma, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.32;
    }

    .archive-link:hover {
      color: #16b36c;
    }

    @media (max-width: 980px) {
      #win-archive {
        width: 94vw;
        height: 82vh;
        min-width: unset;
        min-height: unset;
        left: 3vw;
        top: 6vh;
        resize: none;
      }

      .vice-logo {
        top: 22px;
        left: 20px;
      }

      .vice-title {
        top: 20px;
        right: 20px;
      }

      .vice-panel {
        width: 78vw;
        height: 40vh;
        top: 15%;
      }

      .vice-menu {
        top: 56px;
      }

      .archive-content {
        width: 87vw;
        grid-template-columns: 1fr;
        gap: 14px;
        bottom: 18px;
      }

      .archive-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 640px) {
      .desktop-icon {
        transform: scale(.95);
        transform-origin: top left;
      }

      #start-menu {
        width: 94vw;
        height: 70vh;
      }

      .archive-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .archive-card {
        font-size: 20px;
      }

      .archive-folder-title {
        font-size: 28px;
      }

      .archive-link {
        font-size: 14px;
      }

      .vice-item {
        font-size: 22px;
      }

      .vice-panel {
        width: 84vw;
        height: 34vh;
      }
    }
  </style>
</head>
<body>
  <div id="desktop">
    <div class="desktop-wallpaper-hill"></div>

    <div class="desktop-icon folder active" id="icon-archive" data-open="win-archive">
      <div class="icon-art"></div>
      <span>Archivio</span>
    </div>

    <div class="desktop-icon folder" id="icon-shell" data-open="win-shell">
      <div class="icon-art"></div>
      <span>Terminale</span>
    </div>
  </div>

  <!-- START MENU -->
  <div id="start-menu" class="hidden">
    <div id="start-header">
      <div class="avatar"></div>
      <div>BLUCINELAB</div>
    </div>

    <div id="start-body">
      <div class="start-col left">
        <div class="start-entry" data-open="win-archive"><div class="mini"></div><span>Archivio</span></div>
        <div class="start-entry" data-open="win-shell"><div class="mini"></div><span>Terminale</span></div>
        <div class="start-entry"><div class="mini"></div><span>Internet</span></div>
        <div class="start-entry"><div class="mini"></div><span>Documents</span></div>
      </div>

      <div class="start-col right">
        <div class="start-entry"><div class="mini"></div><span>My Computer</span></div>
        <div class="start-entry"><div class="mini"></div><span>Control Panel</span></div>
        <div class="start-entry"><div class="mini"></div><span>Search</span></div>
        <div class="start-entry"><div class="mini"></div><span>Run...</span></div>
      </div>
    </div>
  </div>

  <!-- SHELL -->
  <section class="window hidden" id="win-shell">
    <div class="window-topbar" data-drag-handle>
      <div class="window-title">Terminale</div>
      <div class="window-actions">
        <button class="window-control" data-minimize="win-shell">—</button>
        <button class="window-control close" data-close="win-shell">✕</button>
      </div>
    </div>
    <div class="window-body">
      <div class="shell-screen">
        C:\BLUCINE&gt; dir<br>
        archive.exe<br>
        projects\<br>
        worlds\<br>
        services\<br><br>
        C:\BLUCINE&gt; _
      </div>
    </div>
  </section>

  <!-- ARCHIVE GTA WINDOW -->
  <section class="window hidden" id="win-archive">
    <div class="window-topbar" data-drag-handle>
      <div class="window-title">ARCHIVE.exe</div>
      <div class="window-actions">
        <button class="window-control" data-minimize="win-archive">—</button>
        <button class="window-control close" data-close="win-archive">✕</button>
      </div>
    </div>

    <div class="window-body">
      <div class="vice-wrap">
        <div class="vice-logo">Vice city</div>
        <div class="vice-title">pause menu</div>

        <div class="vice-panel"></div>

        <nav class="vice-menu">
          <button class="vice-item">resume</button>
          <button class="vice-item">start new game</button>
          <button class="vice-item">map</button>
          <button class="vice-item is-active">archive</button>
          <button class="vice-item">brief</button>
          <button class="vice-item">options</button>
          <button class="vice-item">quit game</button>
        </nav>

        <div class="archive-content">
          <div class="archive-grid">
            <button class="archive-card active" data-folder="projects">projects</button>
            <button class="archive-card" data-folder="services">services</button>
            <button class="archive-card" data-folder="research">research</button>
            <button class="archive-card" data-folder="worlds">worlds</button>
            <button class="archive-card" data-folder="contacts">contacts</button>
            <button class="archive-card" data-folder="extras">extras</button>
          </div>

          <div class="archive-folder-view" id="archive-folder-view"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- TASKBAR -->
  <div id="taskbar">
    <button id="start-button">start</button>
    <div id="taskbar-windows"></div>
    <div id="taskbar-clock"></div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const $ = (sel, ctx = document) => ctx.querySelector(sel);
      const $$ = (sel, ctx = document) => Array.from(ctx.querySelectorAll(sel));

      const startButton = $("#start-button");
      const startMenu = $("#start-menu");
      const taskbarWindows = $("#taskbar-windows");
      const clock = $("#taskbar-clock");

      const windows = $$(".window");
      const desktopIcons = $$(".desktop-icon");
      let topZ = 50;

      const archiveWindow = $("#win-archive");
      const shellWindow = $("#win-shell");
      const folderButtons = $$(".archive-card");
      const folderView = $("#archive-folder-view");

      const archiveData = {
        projects: [
          "palazzo vassé",
          "blucinelab identity",
          "orsetto d’abruzzo",
          "vista mare",
          "stand-up comedy bologna",
          "editorial / catalogue"
        ],
        services: [
          "creative direction",
          "production design",
          "set design",
          "visual identity",
          "web design",
          "art research"
        ],
        research: [
          "image studies",
          "cinematic atmospheres",
          "materials / textures",
          "spatial narration",
          "editorial references",
          "visual archive"
        ],
        worlds: [
          "night systems",
          "blue environments",
          "ritual spaces",
          "coastal imagery",
          "urban melancholy",
          "fiction interfaces"
        ],
        contacts: [
          "blucinelab@gmail.com",
          "instagram / blucinelab",
          "bologna / italy",
          "client deck on request"
        ],
        extras: [
          "downloads",
          "working notes",
          "future archive",
          "unreleased material"
        ]
      };

      function updateClock() {
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, "0");
        const mm = String(now.getMinutes()).padStart(2, "0");
        clock.textContent = `${hh}:${mm}`;
      }

      function getWindowTitle(win) {
        return $(".window-title", win)?.textContent || "Window";
      }

      function ensureTaskbarItem(win) {
        let item = $(`.taskbar-item[data-window="${win.id}"]`);
        if (!item) {
          item = document.createElement("button");
          item.className = "taskbar-item";
          item.dataset.window = win.id;
          item.textContent = getWindowTitle(win);
          taskbarWindows.appendChild(item);

          item.addEventListener("click", () => {
            if (win.classList.contains("hidden")) {
              openWindow(win.id);
            } else {
              win.classList.add("hidden");
              item.classList.remove("active");
            }
          });
        }
        return item;
      }

      function setActiveTaskbar(win) {
        $$(".taskbar-item").forEach(el => el.classList.remove("active"));
        const item = ensureTaskbarItem(win);
        item.classList.add("active");
      }

      function openWindow(id) {
        const win = document.getElementById(id);
        if (!win) return;
        win.classList.remove("hidden");
        topZ += 1;
        win.style.zIndex = topZ;
        setActiveTaskbar(win);
        startMenu.classList.add("hidden");
      }

      function closeWindow(id) {
        const win = document.getElementById(id);
        if (!win) return;
        win.classList.add("hidden");
        const taskItem = $(`.taskbar-item[data-window="${id}"]`);
        if (taskItem) taskItem.classList.remove("active");
      }

      function renderFolder(name) {
        const items = archiveData[name] || [];
        folderView.innerHTML = `
          <div class="archive-folder-title">${name}</div>
          <div class="archive-folder-list">
            ${items.map(item => `<a href="#" class="archive-link">${item}</a>`).join("")}
          </div>
        `;
      }

      startButton.addEventListener("click", (e) => {
        e.stopPropagation();
        startMenu.classList.toggle("hidden");
      });

      document.addEventListener("click", (e) => {
        if (!startMenu.contains(e.target) && e.target !== startButton) {
          startMenu.classList.add("hidden");
        }
      });

      $$("[data-open]").forEach(el => {
        el.addEventListener("click", (e) => {
          e.stopPropagation();
          openWindow(el.dataset.open);
        });
      });

      $$("[data-close]").forEach(el => {
        el.addEventListener("click", (e) => {
          e.stopPropagation();
          closeWindow(el.dataset.close);
        });
      });

      $$("[data-minimize]").forEach(el => {
        el.addEventListener("click", (e) => {
          e.stopPropagation();
          const id = el.dataset.minimize;
          const win = document.getElementById(id);
          if (!win) return;
          win.classList.add("hidden");
          const item = $(`.taskbar-item[data-window="${id}"]`);
          if (item) item.classList.remove("active");
        });
      });

      windows.forEach(win => {
        ensureTaskbarItem(win);

        win.addEventListener("mousedown", () => {
          topZ += 1;
          win.style.zIndex = topZ;
          setActiveTaskbar(win);
        });

        const handle = $("[data-drag-handle]", win);
        if (!handle) return;

        let isDragging = false;
        let offsetX = 0;
        let offsetY = 0;

        handle.addEventListener("mousedown", (e) => {
          isDragging = true;
          topZ += 1;
          win.style.zIndex = topZ;
          setActiveTaskbar(win);

          const rect = win.getBoundingClientRect();
          offsetX = e.clientX - rect.left;
          offsetY = e.clientY - rect.top;
          document.body.style.userSelect = "none";
        });

        document.addEventListener("mousemove", (e) => {
          if (!isDragging) return;

          const x = e.clientX - offsetX;
          const y = e.clientY - offsetY;

          win.style.left = `${Math.max(0, x)}px`;
          win.style.top = `${Math.max(0, y)}px`;
        });

        document.addEventListener("mouseup", () => {
          isDragging = false;
          document.body.style.userSelect = "";
        });
      });

      folderButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          folderButtons.forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          renderFolder(btn.dataset.folder);
        });
      });

      desktopIcons.forEach(icon => {
        icon.addEventListener("click", () => {
          desktopIcons.forEach(i => i.classList.remove("active"));
          icon.classList.add("active");
        });

        icon.addEventListener("dblclick", () => {
          const target = icon.dataset.open;
          if (target) openWindow(target);
        });
      });

      renderFolder("projects");
      updateClock();
      setInterval(updateClock, 1000);
    });
  </script>
</body>
</html>
