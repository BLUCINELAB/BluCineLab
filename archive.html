<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Archive — BluCineLab</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
background:#03060b;
color:#eae4d6;
font-family:Inter,sans-serif;
margin:0;
}

.container{
max-width:1300px;
margin:auto;
padding:80px 30px;
}

h1{
font-family:Oswald;
font-weight:300;
letter-spacing:0.06em;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
}

.project{
border:1px solid rgba(208,178,122,0.4);
border-radius:16px;
overflow:hidden;
background:#0c1117;
}

.project img{
width:100%;
height:230px;
object-fit:cover;
}

.project-info{
padding:20px;
}

.project-info h3{
font-family:Oswald;
font-weight:300;
margin-bottom:8px;
}

.project-info p{
font-size:14px;
color:#bfb8a7;
}

</style>

</head>

<body>

<div class="container">

<h1>Archive</h1>

<div class="grid">

<div class="project">
<img src="https://images.unsplash.com/photo-1485846234645-a62644f84728">
<div class="project-info">
<h3>Cinema Set</h3>
<p>Scenografie cinematografiche e ambienti narrativi.</p>
</div>
</div>

<div class="project">
<img src="https://images.unsplash.com/photo-1515879218367-8466d910aaa4">
<div class="project-info">
<h3>Digital Systems</h3>
<p>Progettazione siti e ambienti digitali.</p>
</div>
</div>

<div class="project">
<img src="https://images.unsplash.com/photo-1511578314322-379afb476865">
<div class="project-info">
<h3>Spatial Events</h3>
<p>Mostre e allestimenti per eventi.</p>
</div>
</div>

</div>

</div>

</body>
</html>
