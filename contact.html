<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLUCINELAB — Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#02050a;--panel:rgba(10,15,22,.74);--text:#e8e2d7;--text-soft:rgba(220,212,198,.82);--gold:rgba(208,178,122,.42);--gold-strong:rgba(230,198,140,.74);--max:1180px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:linear-gradient(180deg,#071018 0%,#030910 36%,#010307 100%);color:var(--text);font-family:Inter,sans-serif;min-height:100vh}
    a{text-decoration:none;color:inherit}
    .topbar{position:sticky;top:0;background:rgba(0,0,0,.52);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.05)}
    .topbar-inner{width:min(var(--max),calc(100% - 40px));margin:0 auto;min-height:74px;display:flex;align-items:center;justify-content:space-between;gap:20px}
    .brand,.nav a{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(232,226,214,.9)}
    .page{width:min(var(--max),calc(100% - 40px));margin:0 auto;padding:72px 0 120px}
    h1,h2{font-family:Oswald,sans-serif;font-weight:300;letter-spacing:.08em}
    h1{font-size:clamp(3.2rem,8vw,6.6rem);line-height:.9;margin-bottom:18px;color:#f1e7d0}
    p{line-height:2;color:var(--text-soft);max-width:54ch}
    .hero{display:grid;gap:20px;margin-bottom:42px}
    .box{border:1px solid var(--gold);border-radius:18px;padding:28px;background:linear-gradient(180deg, rgba(255,255,255,.018), rgba(255,255,255,.004)), var(--panel)}
    .links{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}
    .chip{padding:14px 16px;border-radius:999px;border:1px solid var(--gold);font-size:11px;letter-spacing:.16em;text-transform:uppercase;background:rgba(255,255,255,.02)}
    .chip:hover{border-color:var(--gold-strong)}
    .nav{display:flex;gap:18px;flex-wrap:wrap}
    @media (max-width:800px){.page,.topbar-inner{width:calc(100% - 24px)}}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="index.html">BLUCINELAB</a>
      <nav class="nav">
        <a href="studio.html">Studio</a>
        <a href="archive.html">Archive</a>
        <a href="capabilities.html">Capabilities</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <h1>Contact</h1>
      <p>
        Per collaborazioni, commissioni, direzione creativa, scenografie, identità visive,
        ambienti digitali e progetti speciali.
      </p>
    </section>

    <section class="box">
      <p>
        Per un primo contatto: contesto, obiettivo, tempi, luogo e tipo di progetto.
      </p>

      <div class="links">
        <a class="chip" href="mailto:hello@blucinelab.com">Email</a>
        <a class="chip" href="https://instagram.com/blucinelab" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a class="chip" href="archive.html">Archive</a>
      </div>
    </section>
  </main>
</body>
</html>
